cf_dns_api_token: ""
oci_host: ""
oci_parent_host: ""
# Local-network domain, used alongside oci_parent_host for dual-host routing
# on hosts whose services should also be reachable without going out to the
# public domain (e.g. gliese: budget.gliese.lan works on the LAN even if
# budget.{{ oci_parent_host }} is unreachable).
local_host: ""
thor_tailscale_ip: ""
tenzing_host: ""
jellyfin_tailscale_ip: ""
# Mac's tailnet IP - lets the litellm proxy on gliese reach LM Studio's
# OpenAI-compatible server running on the mac (http://<ip>:1234/v1).
mac_tailscale_ip: ""

# Traefik host-side port overrides. Defaults below match tyr; gliese should
# override these (e.g. 8080/8043/8081) since 80/443 are already in use there.
traefik_http_port: "80"
traefik_https_port: "443"
traefik_dashboard_port: "8080"

# CrowdSec bouncer API key - generate on the crowdsec container after first
# start with: podman exec crowdsec cscli bouncers add crowdsec-bouncer
crowdsec_bouncer_api_key: ""

# Replay Hub WebDAV credentials (optional - only if using WebDAV storage)
webdav_url: ""
webdav_username: ""
webdav_password: ""

# LiteLLM proxy - OpenRouter key for non-local/non-sensitive routing, and the
# master key clients (Obsidian Copilot, MCP servers) must present to the proxy.
openrouter_api_key: ""
litellm_master_key: ""
