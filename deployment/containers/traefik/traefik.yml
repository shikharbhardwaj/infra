entryPoints:
  web:
    address: ":80"
    forwardedHeaders:
      trustedIPs:
        - "10.0.0.0/16"
  websecure:
    address: ":443"
    forwardedHeaders:
      trustedIPs:
        - "10.0.0.0/16"
    transport:
      respondingTimeouts:
        readTimeout: 0
        writeTimeout: 0
        idleTimeout: 3600s

api:
  dashboard: true
  insecure: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    useBindPortIP: true
  # serversTransports aren't supported via the docker/podman label provider
  # (Traefik's rawdata dump has no serversTransports key at all for it), so
  # this stays file-based. It's purely static/host-agnostic - safe on every
  # host since transports are inert unless a service actually references one.
  file:
    filename: /etc/traefik/transports.yml
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      storage: /letsencrypt/acme.json
      dnschallenge:
        provider: cloudflare


log:
  level: INFO

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: keep
      names:
        X-Forwarded-For: keep
        Cf-Connecting-Ip: keep
