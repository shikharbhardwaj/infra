# Container Inventory File
#
# This file specifies which containers should be installed on each host.
# Format: hostname: [list of containers]
#
# The hostname must match the output of the `hostname` command.
# To use this file:
#   1. Copy this file to inventory.yml (or any name you prefer)
#   2. Edit the hostnames and container lists below
#   3. Run: ./install --inventory inventory.yml
#
# To install all containers regardless of inventory:
#   ./install --all
#
# ## Base/Overlay Structure (kustomize-style variants)
#
# Containers can use a base/overlay structure for host-specific configs:
#
#   container-name/
#   ├── config.yml              # Shared config (podman secrets, etc.)
#   ├── base/                   # Base configuration files
#   │   ├── app.container
#   │   └── config.yml
#   └── overlays/
#       └── <hostname>/         # Host-specific overrides (merged with base)
#           ├── app.container   # Partial - only keys to override
#           └── config.yml
#
# Merge behavior:
#   - .container files: INI-style merge (overlay keys override base)
#   - .yml/.yaml files: Deep merge (overlay values override base)
#   - Other files: Overlay completely replaces base
#
# If no base/ directory exists, the container uses flat structure (backward compatible).
# If no overlay matches the hostname, only base files are used.

# Example configuration:
gliese:
    - traefik
    - uptime-kuma
    - crafty

# Additional example hosts:
# server-1:
#   - traefik
#   - uptime-kuma
#
# server-2:
#   - crafty
#
# server-3:
#   - traefik
