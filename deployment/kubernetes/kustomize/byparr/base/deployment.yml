apiVersion: apps/v1
kind: Deployment
metadata:
  name: byparr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: byparr
  template:
    metadata:
      labels:
        app: byparr
    spec:
      containers:
      - name: byparr
        image: ghcr.io/thephaseless/byparr:latest
        ports:
        - containerPort: 8191
          name: web
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
