name: CD Containers

on:
  push:
    branches: [main]
    paths:
      - deployment/containers/**
  workflow_dispatch: {}

jobs:
  deploy-containers:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Deploy to tyr and gliese
        run: |
          set -euo pipefail
          for target in "ubuntu@tyr" "gliese@gliese"; do
            echo "Deploying containers to $target"
            ssh -o StrictHostKeyChecking=accept-new "$target" '
              set -euo pipefail
              cd ~/infra
              git pull --ff-only origin main
              cd deployment/containers
              ./install --inventory inventory.yml --restart
            '
          done
